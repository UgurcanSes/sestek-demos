<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.demo-wrap{width:100%;max-width:900px;background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.12)}
.demo-header{background:#1a1a2e;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.demo-title{color:white;font-size:14px;font-weight:500;opacity:0.9}
.step-dots{display:flex;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);transition:background 0.3s}
.dot.active{background:#4f9cf9}
.img-container{position:relative;width:100%;cursor:pointer}
.img-container img{width:100%;display:block}
.highlight-box{position:absolute;border:3px solid #f59e0b;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);transition:all 0.4s;pointer-events:none}
.tooltip{position:absolute;background:#1a1a2e;color:white;border-radius:8px;padding:12px 16px;max-width:260px;font-size:13px;line-height:1.5;pointer-events:none;transition:all 0.4s;z-index:10}
.tooltip::before{content:'';position:absolute;border:7px solid transparent}
.tooltip.below::before{top:-14px;left:20px;border-bottom-color:#1a1a2e}
.tooltip.above::before{bottom:-14px;left:20px;border-top-color:#1a1a2e}
.tooltip-step{font-size:11px;color:#4f9cf9;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.demo-footer{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #eee}
.nav-btn{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-prev{background:#f0f0f0;color:#555}
.btn-prev:hover{background:#e0e0e0}
.btn-next{background:#4f9cf9;color:white}
.btn-next:hover{background:#3a8ae0}
.btn-next:disabled,.btn-prev:disabled{opacity:0.4;cursor:default}
.progress{font-size:12px;color:#888}
</style>
</head>
<body>
<div class="demo-wrap">
  <div class="demo-header">
    <span class="demo-title">Knovvu Analytics — Form Oluşturma</span>
    <div class="step-dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
  </div>
  <div class="img-container" id="imgWrap">
    <img id="mainImg" src="" alt="Demo ekranı">
    <div class="highlight-box" id="hbox"></div>
    <div class="tooltip" id="tip">
      <div class="tooltip-step" id="tipStep"></div>
      <div id="tipText"></div>
    </div>
  </div>
  <div class="demo-footer">
    <button class="nav-btn btn-prev" id="btnPrev" onclick="go(-1)" disabled>← Geri</button>
    <span class="progress" id="prog">1 / 3</span>
    <button class="nav-btn btn-next" id="btnNext" onclick="go(1)">İleri →</button>
  </div>
</div>

let cur = 0;

function render() {
  const s = steps[cur];
  document.getElementById('mainImg').src = 'data:image/jpeg;base64,' + imgs[cur];
  
  const wrap = document.getElementById('imgWrap');
  const iw = wrap.offsetWidth || 900;
  const ih = document.getElementById('mainImg').offsetHeight || 506;
  
  const hb = document.getElementById('hbox');
  const h = s.highlight;
  hb.style.left = h.x + '%';
  hb.style.top = h.y + '%';
  hb.style.width = h.w + '%';
  hb.style.height = h.h + '%';
  
  const tip = document.getElementById('tip');
  const ty = h.y + h.h + 2;
  const useAbove = ty > 75;
  tip.className = 'tooltip ' + (useAbove ? 'above' : 'below');
  tip.style.left = Math.min(h.x, 70) + '%';
  tip.style.top = useAbove ? (h.y - 18) + '%' : ty + '%';
  
  document.getElementById('tipStep').textContent = s.title;
  document.getElementById('tipText').textContent = s.text;
  document.getElementById('prog').textContent = (cur+1) + ' / ' + steps.length;
  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === steps.length - 1;
  
  for(let i=0;i<steps.length;i++){
    document.getElementById('d'+i).className = 'dot' + (i===cur?' active':'');
  }
}

function go(dir) {
  cur = Math.max(0, Math.min(steps.length-1, cur+dir));
  render();
}
